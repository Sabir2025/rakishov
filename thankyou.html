<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Спасибо! | Сабир Ракишов</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f5f5f5;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .container {
            text-align: center;
            padding: 40px;
        }
        .checkmark {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            background: #4CAF50;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .checkmark svg {
            width: 40px;
            height: 40px;
            stroke: white;
            stroke-width: 3;
            fill: none;
        }
        h1 {
            font-size: 28px;
            color: #1a1a1a;
            margin-bottom: 12px;
        }
        p {
            color: #555;
            font-size: 16px;
            margin-bottom: 32px;
        }
        a {
            display: inline-block;
            padding: 14px 28px;
            background: #2d2d2d;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            transition: background 0.2s;
        }
        a:hover {
            background: #444;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="checkmark">
            <svg viewBox="0 0 24 24">
                <polyline points="20 6 9 17 4 12"/>
            </svg>
        </div>
        <h1>Спасибо за заявку!</h1>
        <p>Я свяжусь с вами в течение 2 часов.</p>
        <a href="index.html">Вернуться на сайт</a>
    </div>
</body>
</html>
